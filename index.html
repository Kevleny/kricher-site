<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Techlab</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --bg2: #0d1117;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(99,179,255,0.35);
      --text: #dde2f0;
      --text-dim: #4a5166;
      --accent: #3d7eff;
      --accent-glow: rgba(61,126,255,0.25);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AUTH MODAL ── */
    #auth-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7,9,15,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s, visibility 0.25s;
    }

    #auth-modal.open {
      opacity: 1;
      visibility: visible;
    }

    .auth-box {
      width: 100%;
      max-width: 340px;
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg2);
      position: relative;
    }

    .auth-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }
    .auth-close:hover { color: var(--text); }

    .auth-logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .auth-box h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .auth-box p {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .field { margin-bottom: 12px; }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--text-dim); }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .auth-error {
      font-size: 12px;
      color: #ff4d4d;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .auth-btn:hover { opacity: 0.9; box-shadow: 0 0 20px var(--accent-glow); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-btn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
    }
    .auth-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── MAIN APP ── */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(61,126,255,0.12) 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
      bottom: -100px; right: -50px;
    }

    .site-header {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
      z-index: 1;
    }

    .site-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .site-label::before, .site-label::after {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .site-title {
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      min-width: 180px;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(61,126,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .nav-btn:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 30px rgba(61,126,255,0.15), inset 0 0 30px rgba(61,126,255,0.03);
      transform: translateY(-2px);
      color: #fff;
    }
    .nav-btn:hover::before { opacity: 1; }

    /* Lock indicator on protected buttons */
    .nav-btn .lock {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 9px;
      opacity: 0.25;
      transition: opacity 0.2s;
    }
    .nav-btn:hover .lock { opacity: 0.5; }
    .nav-btn.authenticated .lock { display: none; }

    .nav-btn-icon { font-size: 18px; line-height: 1; }
    .nav-btn-label { font-size: 14px; font-weight: 600; }

    .site-footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 1;
    }

    .footer-item {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #30d158;
      box-shadow: 0 0 6px #30d158;
    }

    .logout-link {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.2s;
      display: none;
    }
    .logout-link:hover { color: #ff4d4d; }
    .logout-link.visible { display: inline; }

    @media (max-width: 500px) {
      .nav-buttons { flex-direction: column; align-items: stretch; }
      .nav-btn { min-width: unset; }
    }
  </style>
</head>
<body>

<!-- ── AUTH MODAL ── -->
<div id="auth-modal" onclick="handleModalClick(event)">
  <div class="auth-box">
    <button class="auth-close" onclick="closeModal()">✕</button>
    <div class="auth-logo">Techlab</div>
    <h2>Accès restreint</h2>
    <p>Connectez-vous pour continuer.</p>
    <div class="field">
      <input type="email" id="auth-email" placeholder="Adresse e-mail" autocomplete="email" />
    </div>
    <div class="field">
      <input type="password" id="auth-password" placeholder="Mot de passe" autocomplete="current-password" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-submit" onclick="login()">
      Connexion
      <span class="spinner"></span>
    </button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="site-header">
    <div class="site-label">Portail</div>
    <h1 class="site-title">Techlab</h1>
  </header>

  <nav class="nav-buttons">
    <button class="nav-btn" onclick="protectedNav('https://kevleny.github.io/calendrier-chou/')">
      <span class="lock">🔒</span>
      <span class="nav-btn-icon">📅</span>
      <span class="nav-btn-label">Calendrier</span>
    </button>
    <button class="nav-btn" onclick="protectedNav('apps/')">
      <span class="lock">🔒</span>
      <span class="nav-btn-icon">⚡</span>
      <span class="nav-btn-label">Projets</span>
    </button>
    <a href="helpdesk/" class="nav-btn">
      <span class="nav-btn-icon">🛠</span>
      <span class="nav-btn-label">Helpdesk</span>
    </a>
  </nav>

  <footer class="site-footer">
    <span class="footer-item">
      <span class="footer-dot"></span>
      Système opérationnel
    </span>
    <span class="footer-item">kricher.fr</span>
    <button class="logout-link" id="logout-btn" onclick="logout()">Déconnexion</button>
  </footer>
</div>

<script>
  const SUPABASE_URL  = 'https://ttuisauvkjqldkmejgtg.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0dWlzYXV2a2pxbGRrbWVqZ3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjQwOTYsImV4cCI6MjA4OTk0MDA5Nn0.aKikyVTGl6HVSVrKngGA-LR5VMMiTg37DFwJ0V7GW0A';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let pendingUrl = null;
  let isAuthenticated = false;

  // Check existing session silently on load
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) setAuthenticated(true);
  })();

  function setAuthenticated(val) {
    isAuthenticated = val;
    document.querySelectorAll('.nav-btn').forEach(b => {
      if (val) b.classList.add('authenticated');
      else b.classList.remove('authenticated');
    });
    const logoutBtn = document.getElementById('logout-btn');
    if (val) logoutBtn.classList.add('visible');
    else logoutBtn.classList.remove('visible');
  }

  // Click on protected button
  function protectedNav(url) {
    if (isAuthenticated) {
      window.open(url, '_blank');
      return;
    }
    pendingUrl = url;
    openModal();
  }

  function openModal() {
    document.getElementById('auth-error').textContent = '';
    document.getElementById('auth-email').value = '';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-modal').classList.add('open');
    setTimeout(() => document.getElementById('auth-email').focus(), 100);
  }

  function closeModal() {
    document.getElementById('auth-modal').classList.remove('open');
    pendingUrl = null;
  }

  // Close on backdrop click
  function handleModalClick(e) {
    if (e.target === document.getElementById('auth-modal')) closeModal();
  }

  async function login() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    const btn      = document.getElementById('auth-submit');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Veuillez remplir tous les champs.'; return; }

    btn.disabled = true;
    btn.classList.add('loading');

    const { error } = await sb.auth.signInWithPassword({ email, password });

    btn.disabled = false;
    btn.classList.remove('loading');

    if (error) {
      errEl.textContent = 'Identifiants incorrects.';
      return;
    }

    setAuthenticated(true);
    closeModal();

    if (pendingUrl) {
      const url = pendingUrl;
      pendingUrl = null;
      window.open(url, '_blank');
    }
  }

  async function logout() {
    await sb.auth.signOut();
    setAuthenticated(false);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-password').focus();
  });
</script>

</body>
</html>
