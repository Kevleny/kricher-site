<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Techlab</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --bg2: #0d1117;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(99,179,255,0.35);
      --text: #dde2f0;
      --text-dim: #4a5166;
      --accent: #3d7eff;
      --accent-glow: rgba(61,126,255,0.25);
      --accent2: #00d4ff;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── GRID LINES ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.5s, visibility 0.5s;
    }

    #auth-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg2);
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .auth-box h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .auth-box p {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--text-dim); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .auth-error {
      font-size: 12px;
      color: #ff4d4d;
      margin-bottom: 14px;
      min-height: 16px;
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .auth-btn:hover { opacity: 0.9; box-shadow: 0 0 20px var(--accent-glow); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-btn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    .auth-btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── MAIN APP ── */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      opacity: 0;
      transition: opacity 0.6s 0.1s;
    }

    #app.visible { opacity: 1; }

    /* GLOW ORBS */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(61,126,255,0.12) 0%, transparent 70%);
      top: -150px; left: -100px;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
      bottom: -100px; right: -50px;
    }

    /* HEADER */
    .site-header {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
      z-index: 1;
    }

    .site-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .site-label::before,
    .site-label::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .site-title {
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* BUTTONS */
    .nav-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.1px;
      transition: all 0.25s;
      min-width: 180px;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(61,126,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .nav-btn:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 30px rgba(61,126,255,0.15), inset 0 0 30px rgba(61,126,255,0.03);
      transform: translateY(-2px);
      color: #fff;
    }

    .nav-btn:hover::before { opacity: 1; }

    .nav-btn-icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-btn-label { font-size: 14px; font-weight: 600; }

    /* FOOTER */
    .site-footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 1;
    }

    .footer-item {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #30d158;
      box-shadow: 0 0 6px #30d158;
    }

    .logout-link {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.2s;
    }

    .logout-link:hover { color: #ff4d4d; }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      .nav-buttons { flex-direction: column; align-items: stretch; }
      .nav-btn { min-width: unset; }
    }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Techlab</div>
    <h2>Accès restreint</h2>
    <p>Connectez-vous pour accéder à l'espace.</p>
    <div class="field">
      <input type="email" id="auth-email" placeholder="Adresse e-mail" autocomplete="email" />
    </div>
    <div class="field">
      <input type="password" id="auth-password" placeholder="Mot de passe" autocomplete="current-password" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-submit" onclick="login()">
      Connexion
      <span class="spinner"></span>
    </button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="site-header">
    <div class="site-label">Portail</div>
    <h1 class="site-title">Techlab</h1>
  </header>

  <nav class="nav-buttons">
    <a href="https://kevleny.github.io/calendrier-chou/" target="_blank" class="nav-btn">
      <span class="nav-btn-icon">📅</span>
      <span class="nav-btn-label">Calendrier</span>
    </a>
    <a href="apps/" class="nav-btn">
      <span class="nav-btn-icon">⚡</span>
      <span class="nav-btn-label">Projets</span>
    </a>
    <a href="helpdesk/" class="nav-btn">
      <span class="nav-btn-icon">🛠</span>
      <span class="nav-btn-label">Helpdesk</span>
    </a>
  </nav>

  <footer class="site-footer">
    <span class="footer-item">
      <span class="footer-dot"></span>
      Système opérationnel
    </span>
    <span class="footer-item">kricher.fr</span>
    <button class="logout-link" onclick="logout()">Déconnexion</button>
  </footer>
</div>

<script>
  const SUPABASE_URL  = 'https://ttuisauvkjqldkmejgtg.supabase.co';
  const SUPABASE_ANON = 'VOTRE_CLE_ANON_ICI'; // ← à remplacer

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const authScreen = document.getElementById('auth-screen');
  const app        = document.getElementById('app');
  const errEl      = document.getElementById('auth-error');
  const btn        = document.getElementById('auth-submit');

  // ── Check session on load
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) showApp();
  })();

  // ── Login
  async function login() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Veuillez remplir tous les champs.'; return; }

    btn.disabled = true;
    btn.classList.add('loading');

    const { error } = await sb.auth.signInWithPassword({ email, password });

    btn.disabled = false;
    btn.classList.remove('loading');

    if (error) {
      errEl.textContent = 'Identifiants incorrects.';
    } else {
      showApp();
    }
  }

  // ── Logout
  async function logout() {
    await sb.auth.signOut();
    authScreen.classList.remove('hidden');
    app.classList.remove('visible');
  }

  // ── Show app
  function showApp() {
    authScreen.classList.add('hidden');
    requestAnimationFrame(() => app.classList.add('visible'));
  }

  // ── Enter on password
  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-password').focus();
  });
</script>

</body>
</html>
