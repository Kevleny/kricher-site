<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Notre Calendrier</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #090e0b;
      --surface:     #0f1a12;
      --surface-2:   #162019;
      --surface-3:   #1d2c20;
      --border:      rgba(180,210,185,.1);
      --border-hi:   rgba(180,210,185,.28);
      --text:        #b8d4be;
      --text-dim:    rgba(180,210,185,.4);
      --text-bright: #dff0e2;
      --caen:        #d4a843;
      --rochette:    #00d4ff;
      --danger:      #e07878;
      --r:           12px;
      --sidebar-w:   310px;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 10% 10%, rgba(212,168,67,.08) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(0,212,255,.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(22,50,28,.4) 0%, transparent 80%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grille cartographique */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(120,180,130,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,180,130,.06) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none; z-index: 0;
    }

    /* ── Screens ────────────────────────────────────────── */
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: flex; }
    #auth-screen, #profile-screen {
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #app { flex-direction: column; height: 100dvh; height: 100vh; overflow: hidden; }

    /* ── Auth Card ──────────────────────────────────────── */
    .card {
      background: rgba(15,30,46,.92);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(200,185,155,.18);
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(200,185,155,.06), inset 0 1px 0 rgba(200,185,155,.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%; max-width: 400px;
    }

    .card-logo { text-align: center; margin-bottom: 28px; }
    .card-logo h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px; font-weight: 700; color: var(--text-bright);
      letter-spacing: .18em; text-transform: uppercase;
    }
    .card-logo p {
      font-size: 11px; color: var(--text-dim);
      letter-spacing: .14em; text-transform: uppercase; margin-top: 5px;
    }

    .cities-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px;
      background: linear-gradient(135deg, rgba(240,180,130,.06), rgba(94,206,206,.06));
      border: 1px solid var(--border); border-radius: 8px; margin-bottom: 28px;
    }
    .city-tag { font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
    .city-tag.caen     { color: var(--caen); text-shadow: 0 0 12px rgba(240,180,130,.4); }
    .city-tag.rochette { color: var(--rochette); text-shadow: 0 0 12px rgba(94,206,206,.4); }
    .route-sep { flex: 1; border-top: 1px dashed rgba(200,185,155,.25); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .tab {
      flex: 1; padding: 11px; text-align: center;
      font-size: 13px; cursor: pointer; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--text-dim);
      font-family: inherit; transition: all .2s;
    }
    .tab.active { color: var(--text-bright); border-bottom-color: var(--caen); }

    /* Form */
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 7px;
    }
    input[type=text], input[type=email], input[type=password],
    input[type=time], select {
      width: 100%; padding: 11px 14px;
      background: rgba(22,40,64,.8); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-bright);
      font-size: 15px; font-family: inherit; outline: none;
      transition: all .2s;
    }
    input:focus, select:focus {
      border-color: rgba(240,180,130,.5);
      box-shadow: 0 0 0 3px rgba(240,180,130,.1);
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 7px; padding: 11px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: all .2s; font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--caen), #d4884a);
      color: #07101c; width: 100%; padding: 13px; margin-top: 8px;
      box-shadow: 0 4px 16px rgba(240,180,130,.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,180,130,.4); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--border-hi); background: rgba(255,255,255,.04); }
    .btn-sm { padding: 8px 14px; font-size: 12px; }

    .msg-error { color: var(--danger); font-size: 12px; margin-top: 12px; text-align: center; }
    .msg-info  { color: var(--rochette); font-size: 12px; margin-top: 12px; text-align: center; }

    /* ── Profile Setup ──────────────────────────────────── */
    .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
    .city-opt {
      padding: 20px 10px; border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer; text-align: center;
      background: rgba(22,40,64,.5); color: var(--text); font-family: inherit;
      transition: all .2s;
    }
    .city-opt:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .city-opt.sel-caen     { border-color: var(--caen); background: rgba(240,180,130,.1); box-shadow: 0 0 20px rgba(240,180,130,.15); }
    .city-opt.sel-rochette { border-color: var(--rochette); background: rgba(94,206,206,.1); box-shadow: 0 0 20px rgba(94,206,206,.15); }
    .city-opt .dot { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto 10px; }
    .city-opt .name { font-size: 15px; font-weight: 700; margin-bottom: 3px; color: var(--text-bright); }
    .city-opt .region { font-size: 11px; opacity: .65; }

    /* ── App Header ─────────────────────────────────────── */
    .app-header {
      padding: 0 24px; height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,16,28,.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
    }
    .header-route {
      display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
    }
    .hcity {
      font-size: 11px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; white-space: nowrap;
    }
    .hcity.caen     { color: var(--caen); text-shadow: 0 0 10px rgba(240,180,130,.5); }
    .hcity.rochette { color: var(--rochette); text-shadow: 0 0 10px rgba(94,206,206,.5); }
    .hline { flex: 1; position: relative; height: 1px; }
    .hline::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(240,180,130,.4), rgba(94,206,206,.4));
      border-radius: 1px;
    }
    .hmarker {
      font-size: 13px; line-height: 1; flex-shrink: 0;
      position: relative; display: flex; align-items: center;
      animation: heartbeat 2s ease-in-out infinite;
    }
    .hmarker.caen     { filter: drop-shadow(0 0 5px var(--caen))    drop-shadow(0 0 10px var(--caen)); }
    .hmarker.rochette { filter: drop-shadow(0 0 5px var(--rochette)) drop-shadow(0 0 10px var(--rochette)); }
    @keyframes heartbeat {
      0%,100% { transform: scale(1);    opacity: 1; }
      15%     { transform: scale(1.35); opacity: 1; }
      30%     { transform: scale(1);    opacity: .8; }
      45%     { transform: scale(1.2);  opacity: 1; }
    }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: .3; } 50% { transform: scale(2); opacity: 0; } }

    .header-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--text-bright);
      white-space: nowrap; letter-spacing: .18em; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .user-badge {
      font-size: 12px; color: var(--text);
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 20px;
    }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; }
    .btn-logout {
      font-size: 11px; color: var(--text-dim); background: none;
      border: 1px solid var(--border); cursor: pointer; font-family: inherit;
      padding: 5px 10px; border-radius: 6px; transition: all .2s;
    }
    .btn-logout:hover { color: var(--text); border-color: var(--border-hi); }

    /* Hamburger */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer;
      padding: 8px; border-radius: 8px; flex-shrink: 0;
      transition: background .2s;
    }
    .hamburger:hover { background: rgba(255,255,255,.06); }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
    }

    /* ── App Body ───────────────────────────────────────── */
    .app-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* Calendar */
    .cal-section { flex: 1; padding: 28px 32px; overflow-y: auto; overflow-x: hidden; min-width: 0; min-height: 0; }

    @keyframes slideInFromRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInFromLeft  { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutToLeft   { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-40px); opacity: 0; } }
    @keyframes slideOutToRight  { from { transform: translateX(0); opacity: 1; } to { transform: translateX(40px); opacity: 0; } }
    .cal-grid.slide-out-left  { animation: slideOutToLeft  .18s ease forwards; }
    .cal-grid.slide-out-right { animation: slideOutToRight .18s ease forwards; }
    .cal-grid.slide-in-right  { animation: slideInFromRight .22s cubic-bezier(.25,.46,.45,.94) forwards; }
    .cal-grid.slide-in-left   { animation: slideInFromLeft  .22s cubic-bezier(.25,.46,.45,.94) forwards; }

    .month-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 24px;
    }
    .month-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 600;
      color: var(--text-bright); text-transform: capitalize; letter-spacing: .03em;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; color: var(--text); font-size: 18px;
      transition: all .2s;
    }
    .nav-btn:hover {
      border-color: var(--caen); color: var(--caen);
      box-shadow: 0 0 12px rgba(240,180,130,.2);
    }
    .today-btn {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim); cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .today-btn:hover { border-color: var(--caen); color: var(--caen); }
    .today-btn.current-month { opacity: .35; pointer-events: none; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-hd {
      text-align: center; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim); padding: 10px 0 14px;
    }
    .cal-day {
      display: flex; flex-direction: column;
      align-items: flex-start;
      padding: 8px 7px 6px;
      border-radius: 11px; cursor: pointer; transition: all .18s;
      border: 1px solid var(--border);
      background: rgba(11,23,36,.8);
      min-height: 72px; position: relative; overflow: hidden;
    }
    .cal-day:hover {
      background: var(--surface-2);
      border-color: rgba(190,175,145,.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .cal-day:active { transform: translateY(0); }
    .cal-day.other-month { opacity: .2; pointer-events: none; }
    .cal-day.weekend {
      background: rgba(180,160,220,.07);
      border-color: rgba(180,160,220,.18);
    }
    .cal-day.weekend .day-n { color: rgba(200,180,240,.85); }
    .cal-day.today {
      background: linear-gradient(145deg, rgba(255,170,94,.2), rgba(255,170,94,.07));
      border-color: rgba(255,170,94,.6);
      box-shadow: 0 0 24px rgba(255,170,94,.2), inset 0 1px 0 rgba(255,170,94,.25);
    }
    .cal-day.today .day-n { color: var(--caen); font-weight: 800; }
    .cal-day.has-events { border-color: rgba(190,175,145,.2); }
    .cal-day.today.has-events {
      background: linear-gradient(145deg, rgba(255,170,94,.22), rgba(255,170,94,.08));
    }

    .day-n {
      font-size: 15px; color: var(--text-bright); line-height: 1;
      margin-bottom: 6px; font-weight: 600; align-self: flex-end;
      width: 100%; text-align: right;
    }
    .day-chips { display: flex; flex-direction: column; gap: 3px; width: 100%; }
    .day-chip {
      font-size: 9px; font-weight: 700; letter-spacing: .02em;
      padding: 2px 5px; border-radius: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-left: 2px solid;
    }
    /* Mobile: emoji dots */
    .day-dots      { display: none; gap: 3px; flex-wrap: wrap; justify-content: center; align-items: center; }
    .day-dot-emoji { font-size: 13px; line-height: 1; }
    .day-dot       { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding: 24px 20px; overflow-y: auto;
      background: rgba(7,16,28,.6);
    }
    .sb-section { margin-bottom: 28px; }
    .sb-title {
      font-size: 10px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-dim);
      padding-bottom: 10px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .sb-title::before {
      content: ''; width: 3px; height: 3px; border-radius: 50%;
      background: var(--caen); box-shadow: 0 0 6px var(--caen);
      flex-shrink: 0;
    }

    .next-card {
      background: linear-gradient(145deg, var(--surface-2), var(--surface));
      border: 1px solid var(--border-hi); border-radius: 12px;
      padding: 16px; transition: all .3s;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .next-date  { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text-bright); margin-bottom: 5px; text-transform: capitalize; }
    .next-title { font-size: 15px; color: var(--text); margin-bottom: 4px; font-weight: 500; }
    .next-loc   { font-size: 12px; color: var(--text-dim); }
    .countdown  {
      font-family: 'Cormorant Garamond', serif; font-size: 34px;
      font-weight: 600; line-height: 1.1; margin-top: 12px;
      background: linear-gradient(135deg, var(--caen), #f8d4a0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .countdown.countdown-word { font-size: 24px; }
    .countdown-lbl { font-size: 11px; color: var(--text-dim); margin-top: 3px; letter-spacing: .06em; }

    .user-stat { margin-bottom: 14px; }
    .us-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .us-name   { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text); }
    .us-dot    { width: 9px; height: 9px; border-radius: 50%; }
    .us-count  { font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .bar-bg    { height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 3px; transition: width .6s ease; }

    .recent-ev { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .recent-ev:last-child { border-bottom: none; }
    .recent-title {
      font-size: 13px; color: var(--text-bright); margin-bottom: 3px;
      padding-left: 10px; border-left-width: 3px; border-left-style: solid;
      font-weight: 500;
    }
    .recent-meta  { font-size: 11px; color: var(--text-dim); padding-left: 10px; }

    .empty-msg { font-size: 13px; color: var(--text-dim); font-style: italic; }

    /* ── Drawer (mobile) ────────────────────────────────── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 200;
      backdrop-filter: blur(6px);
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -310px; width: 290px;
      height: 100vh; background: rgba(10,20,34,.97);
      border-left: 1px solid var(--border); z-index: 201;
      padding: 24px 20px; overflow-y: auto;
      transition: right .3s cubic-bezier(.4,0,.2,1);
      box-shadow: -20px 0 60px rgba(0,0,0,.5);
    }
    .drawer.open { right: 0; }
    .drawer-head {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 24px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .drawer-close {
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 18px;
      padding: 6px 10px; line-height: 1; border-radius: 7px; transition: all .2s;
    }
    .drawer-close:hover { background: rgba(255,255,255,.1); }

    /* ── Modal ──────────────────────────────────────────── */
    .modal-ov {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 300;
      backdrop-filter: blur(8px);
      align-items: flex-end; justify-content: center; padding: 0;
    }
    .modal-ov.open { display: flex; }
    @media (min-width: 600px) { .modal-ov { align-items: center; padding: 20px; } }

    .modal {
      background: linear-gradient(160deg, #0f1e2e, #0a1828);
      border: 1px solid var(--border-hi);
      border-radius: 20px 20px 0 0; width: 100%; max-width: 460px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp .25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -20px 60px rgba(0,0,0,.5);
    }
    @media (min-width: 600px) { .modal { border-radius: 16px; } }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-head {
      padding: 20px 22px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; color: var(--text-bright); text-transform: capitalize; font-weight: 600;
    }
    .modal-close {
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; font-size: 18px;
      padding: 6px 10px; line-height: 1; border-radius: 8px; transition: all .2s;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,.1); }
    .modal-body { padding: 16px 22px 24px; }

    .ev-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .ev-item:last-child { border-bottom: none; }
    .ev-bar  { width: 4px; border-radius: 2px; align-self: stretch; min-height: 40px; margin-top: 2px; flex-shrink: 0; }
    .ev-info { flex: 1; min-width: 0; }
    .ev-title { font-size: 15px; font-weight: 600; color: var(--text-bright); margin-bottom: 4px; }
    .ev-meta  { font-size: 12px; color: var(--text-dim); line-height: 1.7; }
    .ev-acts  { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .icon-btn {
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      cursor: pointer; padding: 7px 9px; border-radius: 7px;
      font-size: 14px; color: var(--text-dim); transition: all .2s;
    }
    .icon-btn:hover       { color: var(--text); background: rgba(255,255,255,.1); border-color: var(--border-hi); }
    .icon-btn.del:hover   { color: var(--danger); border-color: rgba(224,120,120,.3); }

    .no-ev { color: var(--text-dim); font-size: 13px; padding: 12px 0 16px; font-style: italic; }

    /* Event form */
    .ev-form {
      background: rgba(22,40,64,.6); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px; margin-top: 8px;
    }
    .ev-form .form-group { margin-bottom: 12px; }
    .ev-form .form-group:last-child { margin-bottom: 0; }

    .form-acts { display: flex; gap: 8px; margin-top: 14px; }

    .btn-add {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px 16px; background: rgba(240,180,130,.06);
      border: 1px dashed rgba(240,180,130,.3); border-radius: 10px;
      color: rgba(240,180,130,.7); cursor: pointer; font-size: 14px;
      font-family: inherit; transition: all .2s; font-weight: 500;

    .btn-add:hover { border-color: var(--caen); color: var(--caen); background: rgba(240,180,130,.1); }

    /* ── Category picker ──────────────────────────────────── */
    .cat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 2px;
    }
    .cat-opt {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 4px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); background: rgba(255,255,255,.03);
      font-family: inherit; transition: all .18s; color: var(--text-dim); font-size: 11px;
      letter-spacing: .04em;
    }
    .cat-opt .cat-emoji { font-size: 20px; line-height: 1; }
    .cat-opt:hover { border-color: var(--border-hi); background: rgba(255,255,255,.07); color: var(--text); }
    .cat-opt.selected {
      border-color: var(--caen); background: rgba(240,180,130,.12);
      color: var(--caen); box-shadow: 0 0 0 1px var(--caen) inset;
    }

    /* ── IRL toggle ───────────────────────────────────────── */
    .irl-toggle {
      display: flex; border-radius: 8px; border: 1px solid var(--border);
      overflow: hidden; margin-top: 2px;
    }
    .irl-opt {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 8px; cursor: pointer; font-family: inherit; font-size: 12px;
      font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      border: none; background: rgba(255,255,255,.03); color: var(--text-dim);
      transition: all .18s;
    }
    .irl-opt:hover { background: rgba(255,255,255,.07); color: var(--text); }
    .irl-opt.selected-irl { background: rgba(61,217,217,.12); color: var(--rochette); }
    .irl-opt.selected-remote { background: rgba(240,180,130,.1); color: var(--caen); }

    /* ── Notes textarea ───────────────────────────────────── */
    textarea.ev-notes {
      width: 100%; min-height: 64px; resize: vertical;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit;
      font-size: 13px; padding: 10px 12px; box-sizing: border-box;
      line-height: 1.5; transition: border-color .2s; outline: none;
    }
    textarea.ev-notes:focus { border-color: var(--border-hi); }
    textarea.ev-notes::placeholder { color: var(--text-dim); }

    /* ── Event display enhancements ───────────────────────── */
    .ev-cat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px; margin-bottom: 5px;
      background: rgba(255,255,255,.06); color: var(--text-dim); border: 1px solid var(--border);
    }
    .ev-cat-badge .badge-emoji { font-size: 13px; }
    .ev-notes-txt {
      font-size: 12px; color: var(--text-dim); font-style: italic;
      margin-top: 4px; line-height: 1.5; border-left: 2px solid var(--border);
      padding-left: 8px;
    }
    .irl-badge {
      display: inline-flex; align-items: center; gap: 3px; font-size: 10px;
      font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 10px; margin-left: 6px;
    }
    .irl-badge.irl  { background: rgba(61,217,217,.15); color: var(--rochette); border: 1px solid rgba(61,217,217,.25); }
    .irl-badge.remote { background: rgba(240,180,130,.12); color: var(--caen); border: 1px solid rgba(240,180,130,.2); }

    /* ── Pull to refresh ───────────────────────────────── */
    #ptrIndicator {
      position: fixed; top: 60px; left: 50%;
      transform: translateX(-50%) translateY(-48px);
      opacity: 0; z-index: 150; pointer-events: none;
      background: var(--surface-2); border: 1px solid var(--border-hi);
      border-radius: 20px; padding: 6px 16px;
      font-size: 12px; font-weight: 600; color: var(--text-dim);
      white-space: nowrap; letter-spacing: .04em;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    #ptrIndicator.releasing { color: var(--caen); border-color: rgba(240,180,130,.4); }
    #ptrIndicator.animating { transition: transform .3s ease, opacity .3s ease; }

    /* ── Toast ──────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: rgba(15,30,46,.95); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 22px; font-size: 13px; font-weight: 500;
      color: var(--text-bright); z-index: 500; transition: transform .3s ease;
      max-width: 360px; text-align: center; pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok   { border-color: rgba(94,206,206,.4); }
    .toast.err  { border-color: rgba(224,120,120,.4); }

    /* ── Sidebar tabs ───────────────────────────────────── */
    .sb-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
    }
    .sb-tab {
      flex: 1; padding: 7px 10px; font-family: inherit; font-size: 11px;
      font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: 7px; cursor: pointer; transition: all .2s;
      color: var(--text-dim); background: transparent;
    }
    .sb-tab.active { background: var(--surface-2); color: var(--text-bright); }
    .sb-tab:hover:not(.active) { color: var(--text); }

    /* ── Planning section ───────────────────────────────── */
    .planning-section {
      flex: 1; overflow-y: auto; padding: 20px 32px;

    .plan-ev {

    .plan-ev-emoji {

      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05); flex-shrink: 0;

      width: 3px; border-radius: 2px; align-self: stretch;

    .plan-ev-title {

    .plan-empty {

    .plan-past-sep {

      letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim);
      margin: 24px 0 8px; position: relative;
    }
    .plan-past-sep::before, .plan-past-sep::after {
      content: ''; position: absolute; top: 50%; width: 30%; height: 1px;
      background: var(--border);

    .plan-past-sep::before { left: 0; }

    /* ── Bottom nav (mobile) ────────────────────────────── */

      display: none; position: fixed; bottom: 0; left: 0; right: 0;

    .bnav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;

    .bnav-btn.active { color: var(--caen); }
    .bnav-icon { font-size: 20px; line-height: 1; }
    .bnav-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 900px) {
      .sidebar     { display: none; }
      .hamburger   { display: flex; }
      .cal-section { padding: 20px 14px; }
      .month-title { font-size: 26px; }
      .bottom-nav  { display: flex; }
      .app-body    { padding-bottom: 60px; }
      .planning-section { padding: 16px 14px 80px; }
    }
    @media (max-width: 600px) {
      .cal-section {
        padding: 10px 8px;

        height: 100%; overflow: hidden;
      }
      .month-nav { flex-shrink: 0; margin-bottom: 8px; }
      .cal-grid {
        flex: 1; min-height: 0;
        grid-template-rows: auto repeat(6, 1fr);
        align-items: stretch;
        gap: 3px;
      }

      .day-chips { display: none; }
      .day-dots  { display: flex; justify-content: center; width: 100%; }
      .cal-day {
        align-items: center; justify-content: center;

        padding: 4px 2px;
      }

    }
    @media (max-width: 520px) {
      .cal-section  { padding: 12px 8px; }
      .cal-grid     { gap: 3px; }

      .cal-section { padding: 10px 6px; }
      .cal-grid    { gap: 2px; }

  </style>
</head>
<body>

<!-- ── Auth ──────────────────────────────────────────────── -->
<div id="auth-screen" class="screen active">

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SUPA_URL = 'https://ttuisauvkjqldkmejgtg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0dWlzYXV2a2pxbGRrbWVqZ3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjQwOTYsImV4cCI6MjA4OTk0MDA5Nn0.aKikyVTGl6HVSVrKngGA-LR5VMMiTg37DFwJ0V7GW0A';
const CITY_COLORS = { 'Caen': '#e8a87c', 'La Rochette': '#7ec8c8' };
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CATEGORIES = [
  { id: 'call',      emoji: '📞', label: 'Appel' },
  { id: 'visit',     emoji: '🚂', label: 'Visite' },
  { id: 'night',     emoji: '🌙', label: 'Soirée' },
  { id: 'restaurant',emoji: '🍽️', label: 'Repas' },
  { id: 'birthday',  emoji: '🎂', label: 'Anniv.' },
  { id: 'travel',    emoji: '✈️', label: 'Voyage' },
  { id: 'movie',     emoji: '🎬', label: 'Film' },
  { id: 'other',     emoji: '📌', label: 'Autre' },
];

const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  session: null, profile: null, profiles: {},
  events: [], year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedDate: null, editingId: null, showForm: false,
  channel: null, selectedCity: '',
  view: 'calendar', sbTab: 'stats'
};

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === mode)
  );
  document.getElementById('authBtn').textContent =
    mode === 'login' ? 'Se connecter' : 'Créer un compte';
  document.getElementById('authMsg').textContent = '';
}

function idToEmail(id) { return `${id.toLowerCase().trim()}@calendrier.app`; }

async function handleAuth(e) {
  e.preventDefault();
  const email = idToEmail(document.getElementById('authId').value.trim());
  const pwd   = document.getElementById('authPwd').value;
  const btn   = document.getElementById('authBtn');
  const msg   = document.getElementById('authMsg');

  btn.disabled = true;
  btn.textContent = '…';
  msg.textContent = '';
  msg.className = 'msg-error';

  try {
    if (authMode === 'login') {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if (error) throw error;
      S.session = data.session;
      await afterLogin();
    } else {
      const { data, error } = await sb.auth.signUp({ email, password: pwd });
      if (error) throw error;
      if (!data.session) {
        msg.className = 'msg-info';
        msg.textContent = '✓ Email de confirmation envoyé. Vérifiez votre boîte, puis connectez-vous.';
        btn.disabled = false;
        btn.textContent = 'Créer un compte';
        return;
      }
      S.session = data.session;
      await afterLogin();
    }
  } catch (err) {
    msg.textContent = err.message;
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Se connecter' : 'Créer un compte';
  }
}

async function afterLogin() {
  const { data: profiles } = await sb.from('profiles').select('*');
  S.profiles = {};
  (profiles || []).forEach(p => { S.profiles[p.id] = p; });
  const uid = S.session.user.id;
  S.profile = S.profiles[uid] || null;
  if (!S.profile) { showScreen('profile'); }
  else { await launchApp(); }
}

async function doLogout() {
  await sb.auth.signOut();
  if (S.channel) sb.removeChannel(S.channel);
  Object.assign(S, { session: null, profile: null, profiles: {}, events: [], channel: null });
  showScreen('auth');
}

}

async function fetchProfiles() {

// ═══════════════════════════════════════════════════════════
// EVENTS CRUD
// ═══════════════════════════════════════════════════════════
async function fetchEvents() {
  const { data } = await sb.from('events').select('*').order('event_date');
  S.events = data || [];
}

async function createEvent(fields) {
  const { data, error } = await sb.from('events')
    .insert({ ...fields, created_by: S.session.user.id })
    .select().single();
  if (error) throw error;
  if (!S.events.find(e => e.id === data.id)) {
    S.events.push(data);
    S.events.sort((a, b) => a.event_date.localeCompare(b.event_date));
  }
  return data;
}

async function updateEvent(id, fields) {
  const { data, error } = await sb.from('events').update(fields).eq('id', id).select().single();
  if (error) throw error;
  const i = S.events.findIndex(e => e.id === id);
  if (i >= 0) S.events[i] = data; else S.events.push(data);
  return data;
}

async function deleteEvent(id) {
  const { error } = await sb.from('events').delete().eq('id', id);
  if (error) throw error;
  S.events = S.events.filter(e => e.id !== id);
}

// ═══════════════════════════════════════════════════════════
// REALTIME
// ═══════════════════════════════════════════════════════════
function subscribeRealtime() {
  if (S.channel) sb.removeChannel(S.channel);
  const uid = () => S.session?.user?.id;

  S.channel = sb.channel('events-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, async payload => {
      const me = uid();

      if (payload.eventType === 'INSERT') {
        if (S.events.find(e => e.id === payload.new.id)) return;
        S.events.push(payload.new);
        S.events.sort((a, b) => a.event_date.localeCompare(b.event_date));
        if (payload.new.created_by !== me) {
          if (!S.profiles[payload.new.created_by]) await fetchProfiles();
          const who = S.profiles[payload.new.created_by]?.name || 'Quelqu\'un';
          notify(`${who} a ajouté "${payload.new.title}"`);
        }
      } else if (payload.eventType === 'UPDATE') {
        const i = S.events.findIndex(e => e.id === payload.new.id);
        if (i >= 0) { if (S.events[i].updated_at === payload.new.updated_at) return; S.events[i] = payload.new; }
        else S.events.push(payload.new);
        if (payload.new.created_by !== me) {
          const who = S.profiles[payload.new.created_by]?.name || 'Quelqu\'un';
          notify(`${who} a modifié "${payload.new.title}"`);
        }
      } else if (payload.eventType === 'DELETE') {
        const existing = S.events.find(e => e.id === payload.old.id);
        if (!existing) return;
        const wasOther = existing.created_by !== me;
        S.events = S.events.filter(e => e.id !== payload.old.id);
        if (wasOther) notify('Un événement a été supprimé du planning');
      }

      renderCalendar();
      renderStats();
      if (S.selectedDate && document.getElementById('modalOv').classList.contains('open')) {
        renderModalBody();
      }
    })
    .subscribe();
}

let _toastT;

// ═══════════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════════
function ds(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function evForDate(date) { return S.events.filter(e => e.event_date === ds(date)); }

function calDays(y, m) {
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  let dow = first.getDay();
  dow = dow === 0 ? 6 : dow - 1; // Mon = 0

  const days = [];
  for (let i = dow - 1; i >= 0; i--) days.push({ date: new Date(y, m, -i), cur: false });
  for (let d = 1; d <= last.getDate(); d++) days.push({ date: new Date(y, m, d), cur: true });
  // Toujours 42 cellules (6 rangées × 7) pour que le grid soit stable
  let next = 1;
  while (days.length < 42) days.push({ date: new Date(y, m+1, next++), cur: false });
  return days;
}

function renderCalendar() {
  const today = ds(new Date());
  const now = new Date();
  document.getElementById('monthTitle').textContent = `${MONTHS[S.month]} ${S.year}`;
  const isCurrentMonth = S.year === now.getFullYear() && S.month === now.getMonth();
  document.getElementById('todayBtn').classList.toggle('current-month', isCurrentMonth);

  const grid = document.getElementById('calGrid');
  // Remove all day cells (keep headers = first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  calDays(S.year, S.month).forEach(({ date, cur }) => {
    const d = ds(date), evs = evForDate(date);
    const isToday = d === today;

    const dow = date.getDay(); // 0=dim, 6=sam
    const isWeekend = dow === 0 || dow === 6;
    const cell = document.createElement('div');
    cell.className = 'cal-day' +
      (!cur ? ' other-month' : '') +
      (isToday ? ' today' : '') +
      (isWeekend && cur ? ' weekend' : '') +
      (evs.length ? ' has-events' : '');

    // Chips (desktop) + dots (mobile)
    const chips = evs.slice(0, 3).map(ev => {
      const color = S.profiles[ev.created_by]?.color || '#ffaa5e';
      const cat = CATEGORIES.find(c => c.id === ev.category);
      const prefix = cat ? cat.emoji + ' ' : '';
      const title = ev.title.length > 9 ? ev.title.slice(0, 8) + '…' : ev.title;
      return `<div class="day-chip" style="background:${color}22;border-left-color:${color};color:${color}">${prefix}${esc(title)}</div>`;
    }).join('');

    const dots = evs.slice(0, 3).map(ev => {
      const cat   = CATEGORIES.find(c => c.id === ev.category);
      const color = S.profiles[ev.created_by]?.color || '#ffaa5e';
      return cat
        ? `<span class="day-dot-emoji">${cat.emoji}</span>`
        : `<div class="day-dot" style="background:${color};box-shadow:0 0 6px ${color}90"></div>`;
    }).join('');

    cell.innerHTML = `<span class="day-n">${date.getDate()}</span><div class="day-chips">${chips}</div><div class="day-dots">${dots}</div>`;
    cell.addEventListener('click', () => openModal(date));
    grid.appendChild(cell);
  });
}

let _slideTimer = null;
function changeMonth(dir) {
  const grid = document.getElementById('calGrid');
  if (!grid || grid.classList.contains('slide-out-left') || grid.classList.contains('slide-out-right')) return;

  const outClass = dir > 0 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = dir > 0 ? 'slide-in-right' : 'slide-in-left';

  grid.classList.add(outClass);
  clearTimeout(_slideTimer);
  _slideTimer = setTimeout(() => {
    grid.classList.remove(outClass);
    S.month += dir;
    if (S.month > 11) { S.month = 0; S.year++; }
    if (S.month < 0)  { S.month = 11; S.year--; }
    renderCalendar();
    renderStats();
    const g = document.getElementById('calGrid');
    g.classList.add(inClass);
    setTimeout(() => g.classList.remove(inClass), 250);
  }, 180);
}

function goToToday() {
  const now = new Date();
  S.year  = now.getFullYear();
  S.month = now.getMonth();
  renderCalendar();
  renderStats();
}

function showAddForm()  { S.showForm = true;  renderModalBody(); }
function hideAddForm()  { S.showForm = false; renderModalBody(); }
function startEdit(id)  { S.editingId = id; S.showForm = false; renderModalBody(); }
function cancelEdit()   { S.editingId = null; renderModalBody(); }

function pickCat(id, prefix = 'n') {
  const gridId = prefix === 'e' ? 'eCatGrid' : 'catGrid';
  const inputId = prefix === 'e' ? 'eCat' : 'nCat';
  const grid = document.getElementById(gridId);
  if (!grid) return;
  grid.querySelectorAll('.cat-opt').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.cat === id);
  });
  document.getElementById(inputId).value = id;
}

function pickIrl(val, prefix = 'n') {
  const btnIrl    = document.getElementById(prefix === 'e' ? 'eIrlBtnIrl'    : 'irlBtnIrl');
  const btnRemote = document.getElementById(prefix === 'e' ? 'eIrlBtnRemote' : 'irlBtnRemote');
  const input     = document.getElementById(prefix === 'e' ? 'eIrl'          : 'nIrl');
  if (!btnIrl || !btnRemote || !input) return;
  const current = input.value;
  if ((val === true && current === 'true') || (val === false && current === 'false')) {
    // deselect
    btnIrl.className = 'irl-opt';
    btnRemote.className = 'irl-opt';
    input.value = '';
  } else {
    btnIrl.className    = 'irl-opt' + (val === true  ? ' selected-irl'    : '');
    btnRemote.className = 'irl-opt' + (val === false ? ' selected-remote' : '');
    input.value = val ? 'true' : 'false';
  }
}

async function submitAdd(dateStr) {
  const title = (document.getElementById('nTitle').value || '').trim();
  if (!title) { toast('Le titre est requis', 'err'); return; }
  const time    = document.getElementById('nTime').value;
  const endTime = document.getElementById('nEndTime').value;
  if (time && endTime && endTime <= time) { toast('L\'heure de fin doit être après le début', 'err'); return; }
  const loc     = (document.getElementById('nLoc').value || '').trim();
  const cat     = document.getElementById('nCat').value;
  const notes   = (document.getElementById('nNotes').value || '').trim();
  const irlRaw  = document.getElementById('nIrl').value;
  const is_irl  = irlRaw === 'true' ? true : irlRaw === 'false' ? false : null;
  S.showForm = false;
  try {
    await createEvent({
      title, event_date: dateStr,
      event_time: time || null, end_time: endTime || null,
      location: loc || null, category: cat || null,
      notes: notes || null, is_irl
    });
    renderCalendar(); renderStats(); renderModalBody();
    toast('Événement ajouté ✓', 'ok');
  } catch (e) { S.showForm = true; toast(e.message, 'err'); }
}

async function submitEdit(id) {
  const title = (document.getElementById('eTitle').value || '').trim();
  if (!title) { toast('Le titre est requis', 'err'); return; }
  const time    = document.getElementById('eTime').value;
  const endTime = document.getElementById('eEndTime').value;
  if (time && endTime && endTime <= time) { toast('L\'heure de fin doit être après le début', 'err'); return; }
  const loc     = (document.getElementById('eLoc').value || '').trim();
  const cat     = document.getElementById('eCat').value;
  const notes   = (document.getElementById('eNotes').value || '').trim();
  const irlRaw  = document.getElementById('eIrl').value;
  const is_irl  = irlRaw === 'true' ? true : irlRaw === 'false' ? false : null;
  S.editingId = null;
  try {
    await updateEvent(id, {
      title, event_time: time || null, end_time: endTime || null,
      location: loc || null, category: cat || null,
      notes: notes || null, is_irl
    });
    renderCalendar(); renderStats(); renderModalBody();
    toast('Modifié ✓', 'ok');
  } catch (e) { S.editingId = id; toast(e.message, 'err'); }
}

async function doDelete(id) {
  if (!confirm('Supprimer cet événement ?')) return;
  try {
    await deleteEvent(id);
    renderCalendar(); renderStats(); renderModalBody();
    toast('Supprimé', '');
  } catch (e) { toast(e.message, 'err'); }
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
function buildStats() {
  const today = ds(new Date());
  const now   = new Date();

  // Prochain événement
  const upcoming = S.events.filter(e => e.event_date >= today)
    .sort((a, b) => a.event_date.localeCompare(b.event_date));
  const next = upcoming[0];
  let nextH = '';

  if (next) {
    const d           = new Date(next.event_date + 'T12:00:00');
    const todayStr    = ds(now);
    const tmrw        = new Date(now); tmrw.setDate(tmrw.getDate() + 1);
    const tomorrowStr = ds(tmrw);
    const diff        = Math.round((d - new Date(todayStr + 'T12:00:00')) / 86400000);
    const color       = S.profiles[next.created_by]?.color || '#e8a87c';
    let label, isWord;
    if      (next.event_date === todayStr)    { label = "Aujourd'hui !"; isWord = true; }
    else if (next.event_date === tomorrowStr) { label = 'Demain';        isWord = true; }
    else                                      { label = `J−${diff}`;     isWord = false; }
    nextH = `<div class="next-card" style="border-color:${color}40">
      <div class="next-date">${d.toLocaleDateString('fr-FR', { day:'numeric', month:'long' })}</div>
      <div class="next-title">${esc(next.title)}</div>
      ${next.location ? `<div class="next-loc">📍 ${esc(next.location)}</div>` : ''}
      <div class="countdown${isWord ? ' countdown-word' : ''}">${label}</div>
      ${!isWord && diff > 1 ? '<div class="countdown-lbl">jours restants</div>' : ''}
    </div>`;
  } else {
    nextH = '<div class="empty-msg">Aucun événement à venir.</div>';
  }

  // Stats du mois affiché
  const mStr  = `${S.year}-${String(S.month+1).padStart(2,'0')}`;
  const mEvs  = S.events.filter(e => e.event_date.startsWith(mStr));
  const total = mEvs.length;
  const byUid = {};
  mEvs.forEach(e => { byUid[e.created_by] = (byUid[e.created_by] || 0) + 1; });

  let barsH = '';
  Object.values(S.profiles).forEach(p => {
    const cnt = byUid[p.id] || 0;
    const pct = total > 0 ? (cnt / total * 100).toFixed(0) : 0;
    barsH += `<div class="user-stat">
      <div class="us-header">
        <div class="us-name"><div class="us-dot" style="background:${p.color}"></div>${esc(p.name)}</div>
        <div class="us-count">${cnt}</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;
  });
  if (!barsH) barsH = '<div class="empty-msg">Aucun événement ce mois.</div>';

  // Ajouts récents
  const recent = [...S.events].sort((a, b) => b.created_at.localeCompare(a.created_at)).slice(0, 4);
  let recH = '';
  recent.forEach(ev => {
    const d  = new Date(ev.event_date + 'T12:00:00');
    const p  = S.profiles[ev.created_by];
    recH += `<div class="recent-ev">
      <div class="recent-title" style="border-left-color:${p?.color || '#e8a87c'}">${esc(ev.title)}</div>
      <div class="recent-meta">${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}${p ? ' · ' + esc(p.name) : ''}</div>
    </div>`;
  });

  return `
    <div class="sb-section">
      <div class="sb-title">Prochain rendez-vous</div>${nextH}
    </div>
    <div class="sb-section">
      <div class="sb-title">${MONTHS[S.month]} — ${total} événement${total !== 1 ? 's' : ''}</div>${barsH}
    </div>
    ${recH ? `<div class="sb-section"><div class="sb-title">Ajouts récents</div>${recH}</div>` : ''}
  `;
}

function renderStats() {
  const statsH = buildStats();
  document.getElementById('drawerContent').innerHTML = statsH;
  document.getElementById('sidebarContent').innerHTML =
    S.sbTab === 'stats' ? statsH : buildPlanning();
}

// ═══════════════════════════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════════════════════════
function switchView(v) {
  S.view = v;
  const calSection      = document.getElementById('calSection');
  const planningSection = document.getElementById('planningSection');
  const bnavCal         = document.getElementById('bnavCal');
  const bnavPlan        = document.getElementById('bnavPlan');

  if (v === 'planning') {
    calSection.style.display      = 'none';
    planningSection.classList.add('active');
    bnavCal.classList.remove('active');
    bnavPlan.classList.add('active');
    document.getElementById('planningContent').innerHTML = buildPlanning();
  } else {
    calSection.style.display      = '';
    planningSection.classList.remove('active');
    bnavCal.classList.add('active');
    bnavPlan.classList.remove('active');
  }
}

function switchSbTab(tab) {
  S.sbTab = tab;
  document.getElementById('sbTabStats').classList.toggle('active',    tab === 'stats');
  document.getElementById('sbTabPlanning').classList.toggle('active', tab === 'planning');
  document.getElementById('sidebarContent').innerHTML =
    tab === 'stats' ? buildStats() : buildPlanning();
}

function buildPlanning() {
  const today = ds(new Date());
  const upcoming = S.events.filter(e => e.event_date >= today)
    .sort((a, b) => a.event_date.localeCompare(b.event_date));
  const past = S.events.filter(e => e.event_date < today)
    .sort((a, b) => b.event_date.localeCompare(a.event_date))
    .slice(0, 5);

  if (!upcoming.length && !past.length) {
    return '<div class="plan-empty">Aucun événement pour l\'instant.</div>';
  }

  function evHTML(ev) {
    const color  = S.profiles[ev.created_by]?.color || '#e8a87c';
    const cat    = CATEGORIES.find(c => c.id === ev.category);
    const d      = new Date(ev.event_date + 'T12:00:00');
    const label  = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    const time   = ev.event_time ? ' · ' + ev.event_time.slice(0, 5) : '';
    const loc    = ev.location   ? ' · 📍' + esc(ev.location) : '';
    const irlBadge = ev.is_irl === true
      ? `<span class="irl-badge irl" style="font-size:9px;padding:1px 5px">🏠</span>`
      : ev.is_irl === false
        ? `<span class="irl-badge remote" style="font-size:9px;padding:1px 5px">💻</span>`
        : '';
    return `<div class="plan-ev" onclick="openModalByDate('${ev.event_date}')">
      <div class="plan-ev-bar" style="background:${color}"></div>
      <div class="plan-ev-emoji">${cat ? cat.emoji : '📅'}</div>
      <div class="plan-ev-info">
        <div class="plan-ev-title">${esc(ev.title)} ${irlBadge}</div>
        <div class="plan-ev-meta">${label}${time}${loc}</div>
      </div>
    </div>`;
  }

  // Grouper par mois
  let h = '';
  let lastMonth = '';
  upcoming.forEach(ev => {
    const m = ev.event_date.slice(0, 7);
    if (m !== lastMonth) {
      const d = new Date(ev.event_date + 'T12:00:00');
      h += `<div class="plan-month-hd">${d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}</div>`;
      lastMonth = m;
    }
    h += evHTML(ev);
  });

  if (past.length) {
    h += `<div class="plan-past-sep">Passés</div>`;
    past.forEach(ev => { h += evHTML(ev); });
  }

  return h;
}

function openModalByDate(dateStr) {
  openModal(new Date(dateStr + 'T12:00:00'));
}

// ═══════════════════════════════════════════════════════════
// DRAWER & POPUP AUJOURD'HUI
// ═══════════════════════════════════════════════════════════
function checkTodayEvents() {
  const today = new Date();
  const todayStr = ds(today);
  const evs = S.events.filter(e => e.event_date === todayStr);
  if (!evs.length) return;

  // Une seule fois par jour par session
  const key = `today_shown_${todayStr}`;
  if (sessionStorage.getItem(key)) return;
  sessionStorage.setItem(key, '1');

  // Titre
  document.getElementById('todayTitle').textContent =
    today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  // Contenu
  let h = '';
  evs.forEach(ev => {
    const profile = S.profiles[ev.created_by];
    const color   = profile?.color || '#ffaa5e';
    let meta = [];
    if (ev.event_time) meta.push(`🕐 ${ev.event_time.slice(0,5)}${ev.end_time ? ' → ' + ev.end_time.slice(0,5) : ''}`);
    if (ev.location)   meta.push(`📍 ${esc(ev.location)}`);
    if (profile)       meta.push(`— ${esc(profile.name)}`);
    h += `<div class="ev-item">
      <div class="ev-bar" style="background:${color}"></div>
      <div class="ev-info">
        <div class="ev-title">${esc(ev.title)}</div>
        ${meta.length ? `<div class="ev-meta">${meta.join(' ')}</div>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('todayBody').innerHTML = h;
  document.getElementById('todayOv').classList.add('open');
}

function closeTodayPopup() {
  document.getElementById('todayOv').classList.remove('open');
}

function handleTodayClick(e) {
  if (e.target === document.getElementById('todayOv')) closeTodayPopup();
}

// ═══════════════════════════════════════════════════════════
// SWIPE CALENDRIER
// ═══════════════════════════════════════════════════════════
function initSwipe() {
  const el = document.getElementById('calSection');
  if (!el) return;
  let startX = 0, startY = 0;

  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  el.addEventListener('touchend', e => {
    if (document.getElementById('modalOv').classList.contains('open')) return;
    if (document.getElementById('drawer').classList.contains('open')) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dy) > Math.abs(dx)) return;
    changeMonth(dx > 0 ? -1 : 1);
  }, { passive: true });
}

function openDrawer()  {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOv').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOv').classList.remove('open');
}

// SCREEN
// ═══════════════════════════════════════════════════════════
function showScreen(name) {
  const map = { auth: 'auth-screen', profile: 'profile-screen', app: 'app' };
  Object.entries(map).forEach(([k, id]) => {
    document.getElementById(id).classList.toggle('active', k === name);
  });
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

// ═══════════════════════════════════════════════════════════
// PULL TO REFRESH
// ═══════════════════════════════════════════════════════════
function initPullToRefresh() {
  const MIN_PULL = 72;
  const indicator = document.getElementById('ptrIndicator');
  let startY = 0, pulled = 0, active = false, refreshing = false;

  function atScrollTop() {
    const cs = document.getElementById('calSection');
    const ps = document.getElementById('planningSection');
    return (cs && cs.scrollTop === 0) || (ps && ps.scrollTop === 0);
  }

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    startY = e.touches[0].clientY;
    pulled = 0; active = false;
    indicator.classList.remove('animating', 'releasing');
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0 || !atScrollTop()) return;

    active = true;
    pulled = dy;
    const progress = Math.min(dy / MIN_PULL, 1);
    const offsetY  = Math.min(dy * 0.45, 48) - 48;

    indicator.style.transform = `translateX(-50%) translateY(${offsetY}px)`;
    indicator.style.opacity   = String(progress);

    if (progress >= 1) {
      indicator.textContent = '↑ Relâcher pour rafraîchir';
      indicator.classList.add('releasing');
    } else {
      indicator.textContent = '↓ Tirer pour rafraîchir';
      indicator.classList.remove('releasing');
    }
  }, { passive: true });

  document.addEventListener('touchend', async () => {
    if (!active) return;
    active = false;

    if (pulled >= MIN_PULL) {
      refreshing = true;
      indicator.textContent = '⟳ Mise à jour…';
      indicator.classList.add('releasing');
      indicator.style.transform = 'translateX(-50%) translateY(4px)';
      indicator.style.opacity   = '1';

      await fetchEvents();
      renderCalendar();
      renderStats();
      toast('Calendrier mis à jour ✓', 'ok');
    }

    indicator.classList.add('animating');
    indicator.style.transform = 'translateX(-50%) translateY(-48px)';
    indicator.style.opacity   = '0';
    pulled = 0;
    setTimeout(() => {
      indicator.classList.remove('animating', 'releasing');
      refreshing = false;
    }, 300);
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { S.session = session; await afterLogin(); }
  else { window.location.replace('/'); }

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      if (S.channel) sb.removeChannel(S.channel);
      Object.assign(S, { session: null, profile: null, profiles: {}, events: [], channel: null });
      window.location.replace('/');
    } else if (event === 'TOKEN_REFRESHED' && session) {
      S.session = session;
    }
  });
})();
